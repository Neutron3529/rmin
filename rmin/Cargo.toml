[package]
name = "rmin"
version = "0.4.0"
edition = "2021"
description = "A minimal Rust lib for writting R extensions"
authors = ["Neutron3529 <qweytr1@main.ustc.edu.cn>"]
license-file = "LICENSE"
repository = "https://github.com/Neutron3529/rmin"


[features]
default = ["public-by-default-even-public-all-is-not-set","cfg-if","panic-info-message"]
public-by-default-even-public-all-is-not-set = []
std = []
public-all = []
min-import = []
cfg-if = ["dep:cfg-if"]
panic-info-message = []

[dependencies]
cfg-if = { version = "1.0.0", optional = true }
