[package]
name = "rmin"
version = "0.4.0"
edition = "2021"
description = "A minimal Rust lib for writting R extensions"
authors = ["Neutron3529 <qweytr1@main.ustc.edu.cn>"]
license = "AGPL-3.0"
repository = "https://github.com/Neutron3529/rmin"


[features]
default = ["public-by-default-even-public-all-is-not-set","core","panic-info-message"]
public-by-default-even-public-all-is-not-set = []
std = []
core = ["rmin-eh"]
public-all = []
min-import = []
panic-info-message = []
register-routines = []
rmin-eh = ["dep:rmin-eh"]

[dependencies]
rmin-eh = { version = "0.1.0", path = "../rmin-eh", optional = true }
